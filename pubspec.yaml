name: flutter_weather
description: A beautiful weather app built with Flutter and Riverpod, featuring real-time weather data, 5-day forecasts, location search, and animated weather icons.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.6
  weather_icons: ^3.0.0

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  retrofit_generator: ^8.0.6
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
